plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

def releaseKeystorePath = System.getenv("ANDROID_RELEASE_KEYSTORE_PATH")
def releaseStorePassword = System.getenv("ANDROID_RELEASE_STORE_PASSWORD")
def releaseKeyPassword = System.getenv("ANDROID_RELEASE_KEY_PASSWORD")
def releaseKeyAlias = System.getenv("ANDROID_RELEASE_KEY_ALIAS")
def hasReleaseSigning = releaseKeystorePath != null &&
        releaseStorePassword != null &&
        releaseKeyPassword != null &&
        releaseKeyAlias != null

android {
    namespace = "com.epicbrain.epicshikaku"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId = "com.epicbrain.epicshikaku"
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        release {
            if (hasReleaseSigning) {
                storeFile = file(releaseKeystorePath)
                storePassword = releaseStorePassword
                keyPassword = releaseKeyPassword
                keyAlias = releaseKeyAlias
            }
        }
    }

    buildTypes {
        release {
            signingConfig = hasReleaseSigning ? signingConfigs.release : signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    implementation "androidx.core:core-ktx:1.13.1"
}
