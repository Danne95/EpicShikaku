name: Android Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Android platform files when missing
        run: |
          if [ ! -f android/app/build.gradle ]; then
            flutter create --platforms=android .
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: epicshikaku-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  publish-release:
    name: Publish GitHub Release
    needs: build-apk
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Read release version
        id: version
        run: |
          APP_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d '+' -f 1)
          echo "tag=v$APP_VERSION" >> "$GITHUB_OUTPUT"

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: epicshikaku-apk
          path: release

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_NOTES: |
            Download EpicShikaku.apk to install the game.

            GitHub automatically adds the "Source code" zip and tar.gz links for every release tag. They are not game downloads.
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --notes "$RELEASE_NOTES"
            gh release upload "$RELEASE_TAG" release/app-release.apk#EpicShikaku.apk --clobber
          else
            gh release create "$RELEASE_TAG" release/app-release.apk#EpicShikaku.apk --title "EpicShikaku $RELEASE_TAG" --notes "$RELEASE_NOTES" --target "$GITHUB_SHA"
          fi
