name: Android Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish, for example v1.0.0
        required: false
        type: string

permissions:
  contents: read

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Android platform files when missing
        run: |
          if [ ! -f android/app/build.gradle ]; then
            flutter create --platforms=android .
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: epicshikaku-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  publish-release:
    name: Publish GitHub Release
    needs: build-apk
    if: startsWith(github.ref, 'refs/tags/v') || inputs.release_tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: epicshikaku-apk
          path: release

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release/app-release.apk#EpicShikaku.apk --clobber
          else
            gh release create "$RELEASE_TAG" release/app-release.apk#EpicShikaku.apk --title "EpicShikaku $RELEASE_TAG" --generate-notes --target "$GITHUB_SHA"
          fi
